name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  BACKEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/staffverify-repo/backend
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/staffverify-repo/frontend
  DB_INSTANCE: ${{ secrets.GCP_PROJECT_ID }}:us-central1:staffverify-db

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Format check backend
        working-directory: backend
        run: npx prettier --check .

      - name: Format check frontend
        working-directory: frontend
        run: npx prettier --check .

  deploy-backend:
    name: Deploy Backend to Cloud Run
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push backend container
        run: |
          gcloud builds submit backend/ \
            --tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy staffverify-backend \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8080 \
            --add-cloudsql-instances=${{ env.DB_INSTANCE }} \
            --vpc-connector=staffverify-connector \
            --set-env-vars="NODE_ENV=production,JWT_EXPIRES_IN=7d,CORS_ORIGIN=${{ secrets.FRONTEND_URL }},N8N_MASTER_GATEWAY_URL=https://n8n.staffingly.us/webhook/master-gateway,FROM_EMAIL=StaffVerify <noreply@notification.davidudo.dev>" \
            --update-secrets="DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,RESEND_API_KEY=resend-api-key:latest,OCR_SPACE_API_KEY=ocr-space-api-key:latest"

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push frontend container
        run: |
          gcloud builds submit frontend/ \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --build-arg="VITE_API_URL=${{ secrets.BACKEND_URL }}"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy staffverify-frontend \
            --image=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8080
